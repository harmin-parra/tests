name: shared-report-job

on:
  workflow_call:
    inputs:
      allure-version:
        required: true
        type: string
      browser:
        required: true
        type: string

jobs:
  report:
    needs: [test]
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:8-jre

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact_test
          path: reporting

      - name: Report
        env:
          ALLURE: ${{ inputs.allure-version }}
        run: |
          curl https://github.com/allure-framework/allure2/releases/download/${ALLURE}/allure-${ALLURE}.zip -L -o /tmp/allure.zip
          unzip /tmp/allure.zip -d /usr/local/
          ln -s /usr/local/allure-${ALLURE}/bin/allure /usr/local/bin/allure
          ./allure.sh --browser ${{ inputs.browser }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact_report
          path: reporting/*
