name: shared-report-job

on:
  workflow_call:
    inputs:
      allure:
        required: true
        type: string
      browser:
        required: true
        type: string

jobs:
  report:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:8-jre

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact_test
          path: reporting

      - name: Report
        run: |
          apt-get update && apt-get install -y unzip
          curl https://github.com/allure-framework/allure2/releases/download/${{ inputs.allure }}/allure-${{ inputs.allure }}.zip -L -o /tmp/allure.zip
          unzip /tmp/allure.zip -d /usr/local/
          ln -s /usr/local/allure-${{ inputs.allure }}/bin/allure /usr/local/bin/allure
          ./allure.sh --browser ${{ inputs.browser }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact_report
          path: reporting/*
